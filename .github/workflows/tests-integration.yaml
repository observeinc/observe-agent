name: Observe Agent Integration Tests

on:
  workflow_dispatch:
    inputs:
      old_version:
        description: "Old version of observe-agent to test upgrade from (e.g., v2.5.0)"
        required: false
        default: "v2.5.0"
        type: string
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * *" #Runs at 07:00 UTC Daily

#Special permissions required for OIDC authentication
permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  TF_VAR_name_format: "tf-observe-agent-test-%s"
  TF_VAR_PUBLIC_KEY_PATH: "./test_key.pub"
  TF_VAR_PRIVATE_KEY_PATH: "./test_key.pem"
  TF_VAR_OBSERVE_URL: ${{secrets.OBSERVE_URL}}
  TF_VAR_OBSERVE_TOKEN: ${{secrets.OBSERVE_TOKEN}}
  TF_VAR_old_version: ${{ github.event.inputs.old_version || 'v2.5.0' }}

jobs:
  prepare-integration:
    runs-on: ubuntu-observe-agent-8cpu
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.11
      - name: Install qemu
        if: matrix.goos == 'linux'
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker Buildx
        if: matrix.goos == 'linux'
        uses: docker/setup-buildx-action@v4
      - name: Run GoReleaser
        timeout-minutes: 40
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: 2.15.4
          args: release --split --clean --skip=sign,sbom --snapshot --verbose --parallelism 6
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: Save docker as .tar # Save docker image to tar
        if: matrix.goos == 'linux'
        run: |
          amd64_image=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "amd64"| grep "observe-agent" | grep "SNAPSHOT" | sort -r -k4 | head -n 1)
          echo "amd64_image: ${amd64_image}"
          docker save -o dist/observe-agent_docker_amd64.tar ${amd64_image}
      - name: Flatten dist directory
        # `goreleaser release --split` nests artifacts under dist/<goos>_<goarch>/.
        # The terraform integration tests call os.listdir(../dist) and expect a
        # flat layout, so move package artifacts up to dist/ before upload.
        run: |
          find dist -mindepth 2 -maxdepth 2 -type f -exec mv -t dist/ {} +
      - run: pwd && ls -l && ls -l dist/
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist
          if-no-files-found: error

  observe-agent-integration-tests:
    name: observe-agent-integration-tests-${{ matrix.AWS_MACHINE}}
    runs-on: ubuntu-latest
    needs: prepare-integration
    strategy:
      fail-fast: false
      matrix:
        AWS_MACHINE:
          [
            "AMAZON_LINUX_2023",
            "UBUNTU_22_04_LTS",
            "WINDOWS_SERVER_2016_BASE",
            "WINDOWS_SERVER_2019_BASE",
            "WINDOWS_SERVER_2022_BASE",
            "DOCKER_AMD64_UBUNTU_22_04_LTS",
          ]
    defaults:
      run:
        working-directory: integration #Terrafrom commands and tests are ran from integration directory
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - run: git branch && df -h
      - name: Configure AWS Credentials ## Terraform provider automatically uses these creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: ${{ github.sha }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r scripts/requirements.txt

      - name: Setup SSH Keys
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ${{env.TF_VAR_PRIVATE_KEY_PATH}}
          chmod 600 ${{env.TF_VAR_PRIVATE_KEY_PATH}}
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >${{env.TF_VAR_PUBLIC_KEY_PATH}}
          chmod 644 ${{env.TF_VAR_PUBLIC_KEY_PATH}}

      - name: Setup additional terraform variable
        run: echo "TF_VAR_AWS_MACHINE=$(echo ${{matrix.AWS_MACHINE}})" >> $GITHUB_ENV

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        id: artifact-download-step
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - run: pwd && ls -l && ls -l ../dist/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Test
        id: test
        run: |
          terraform test -verbose
